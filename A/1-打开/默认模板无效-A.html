<div id="article"><h1 id="默认模板无效"><a href="#默认模板无效" class="headerlink" title="默认模板无效"></a>默认模板无效</h1><h2 id="问题：打开文件时弹窗默认模板无效"><a href="#问题：打开文件时弹窗默认模板无效" class="headerlink" title="问题：打开文件时弹窗默认模板无效"></a>问题：打开文件时弹窗默认模板无效</h2><img src="默认模板无效-A/image1.png" >

<h2 id="方法："><a href="#方法：" class="headerlink" title="方法："></a>方法：</h2><p>原因：可能是你的模板文件无设置或丢失，打开 STP、x-t 、IGES等格式的零件时出现提示。</p>
<p>1、找到【工具-选项】系统选项，默认模板。</p>
<img src="默认模板无效-A/image2.png" >

<p>2、设置零件、装配体、工程图的默认模板。这个模板会在打开 STP、x-t 等格式的零件时，起作用，在需要用到模板时，预设模板作用。</p>
<img src="默认模板无效-A/image3.png" >
