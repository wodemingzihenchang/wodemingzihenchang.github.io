<div id="article"><h1 id="C-treeview操作"><a href="#C-treeview操作" class="headerlink" title="C#treeview操作"></a>C#treeview操作</h1><span id="more"></span>

<p>参考：</p>
<p>设计层级树结构：<a target="_blank" rel="noopener" href="https://gitee.com/littleboy97/sw-function/tree/S-%E6%A0%91%E5%88%97%E8%A1%A8/">Sw_Function: SW-API-功能开发和测试 - Gitee.com</a></p>
<p>3级分类树结构：<a target="_blank" rel="noopener" href="https://gitee.com/littleboy97/sw-function/tree/%E5%AE%9A%E5%88%B6-Sw_%E5%88%86%E7%B1%BB%E5%B1%9E%E6%80%A7%E5%B7%A5%E5%85%B7/">Sw_Function: SW-API-功能开发和测试 - Gitee.com</a></p>
<h2 id="生成"><a href="#生成" class="headerlink" title="生成"></a>生成</h2><p>原始数据：”分类表.txt”</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">标准件,1,1,1,</span><br><span class="line">标准件,气动元件,,,</span><br><span class="line">标准件,气动元件,气缸,,</span><br><span class="line">标准件,气动元件,气缸,SMC,</span><br><span class="line">标准件,机械传动件,,,</span><br><span class="line">标准件,机械传动件,轴承,,</span><br></pre></td></tr></table></figure>

<p>转换成treeview</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br></pre></td><td class="code"><pre><span class="line">private void TreeView_show()//读取分类列表+显示树结构</span><br><span class="line">      &#123;</span><br><span class="line">          //读取分类列表</span><br><span class="line">          string[] sss = log.Read_Settingfile(&quot;分类表&quot;);</span><br><span class="line">          foreach (var item in sss)</span><br><span class="line">          &#123;</span><br><span class="line">              //拆分单行的分类，</span><br><span class="line">              string[] ss = item.Split(&#x27;,&#x27;);</span><br><span class="line">              List5.Add(ss);</span><br><span class="line"></span><br><span class="line">              //通过是否有值，来填会list6-9的列表里</span><br><span class="line">              if (ss[0] != &quot;&quot;) &#123; List1.Add(ss[0]); &#125;</span><br><span class="line">              List6.Add(ss[0]);</span><br><span class="line">              if (ss[1] != &quot;&quot;) &#123; List2.Add(ss[1]); &#125;</span><br><span class="line">              List7.Add(ss[1]);</span><br><span class="line">              if (ss[2] != &quot;&quot;) &#123; List3.Add(ss[2]); &#125;</span><br><span class="line">              List8.Add(ss[2]);</span><br><span class="line">              if (ss[3] != &quot;&quot;) &#123; List4.Add(ss[3]); &#125;</span><br><span class="line">              List9.Add(ss[3]);</span><br><span class="line">          &#125;</span><br><span class="line">          //排除重复属性名</span><br><span class="line">          List1 = List1.Distinct().ToList();</span><br><span class="line">          List2 = List2.Distinct().ToList();</span><br><span class="line">          List3 = List3.Distinct().ToList();</span><br><span class="line">          List4 = List4.Distinct().ToList();</span><br><span class="line"></span><br><span class="line">          //显示树结构</span><br><span class="line">          TreeNodeCollection nodes1, nodes2, nodes3, nodes4;</span><br><span class="line">          TreeNode node1 = null, node2 = null, node3 = null, node4 = null;</span><br><span class="line">          if (List5 == null || List5.Count == 0) &#123; return; &#125;</span><br><span class="line">          //填入树列表的首个值</span><br><span class="line">          node1 = treeView1.Nodes.Add(List5[0][0]); nodes1 = node1.Nodes;</span><br><span class="line">          node2 = nodes1.Add(List5[0][1]); nodes2 = node2.Nodes;</span><br><span class="line">          node3 = nodes2.Add(List5[0][2]); nodes3 = node3.Nodes;</span><br><span class="line">          node4 = nodes3.Add(List5[0][3]); nodes4 = node4.Nodes;</span><br><span class="line"></span><br><span class="line">          //循环分类表txt内容里的列表list5，把逗号隔开的多级分类进行填写</span><br><span class="line">          for (int i = 0; i &lt; List5.Count; i++)</span><br><span class="line">          &#123;</span><br><span class="line">              tree_recoder.Add(node1.Text);</span><br><span class="line">              tree_recoder.Add(node2.Text);</span><br><span class="line">              tree_recoder.Add(node3.Text);</span><br><span class="line">              tree_recoder.Add(node4.Text);</span><br><span class="line">              if (!(tree_recoder.Contains(List5[i][0]))) &#123; node1 = treeView1.Nodes.Add(List5[i][0]); node1.BackColor = System.Drawing.Color.Aqua; &#125;</span><br><span class="line">              if (!(tree_recoder.Contains(List5[i][1]))) &#123; node2 = node1.Nodes.Add(List5[i][1]); node2.BackColor = System.Drawing.Color.Olive; &#125;</span><br><span class="line">              if (!(tree_recoder.Contains(List5[i][2]))) &#123; node3 = node2.Nodes.Add(List5[i][2]); node3.BackColor = System.Drawing.Color.CadetBlue; &#125;</span><br><span class="line">              if (!(tree_recoder.Contains(List5[i][3]))) &#123; node4 = node3.Nodes.Add(List5[i][3]); node4.BackColor = System.Drawing.Color.Yellow; &#125;</span><br><span class="line">          &#125;</span><br><span class="line">          //空白分类在树列表移除</span><br><span class="line">          if (nodes1[0].Text == &quot;&quot;) &#123; nodes1[0].Remove(); &#125;</span><br><span class="line">          if (nodes2[0].Text == &quot;&quot;) &#123; nodes2[0].Remove(); &#125;</span><br><span class="line">          if (nodes3[0].Text == &quot;&quot;) &#123; nodes3[0].Remove(); &#125;</span><br><span class="line">          treeView1.ExpandAll();  //全展开</span><br><span class="line">          treeView1.Scrollable = true; //带滚动条</span><br><span class="line">      &#125;</span><br></pre></td></tr></table></figure>

<h2 id="删除"><a href="#删除" class="headerlink" title="删除"></a>删除</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">treeView1.Nodes.Clear();</span><br></pre></td></tr></table></figure>

<h2 id="搜索-筛选"><a href="#搜索-筛选" class="headerlink" title="搜索&amp;筛选"></a>搜索&amp;筛选</h2><p>树列表的搜索功能+筛选功能</p>
<figure class="highlight c#"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">region</span> TreeView模糊查找节点，需要包括父级node节点</span></span><br><span class="line">List&lt;TreeNode&gt; listSearchTreeNodes;</span><br><span class="line">List&lt;<span class="built_in">string</span>&gt; knownNodeTexts;</span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">btn_Search_Click</span>(<span class="params"><span class="built_in">object</span> sender, EventArgs e</span>)</span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="comment">// 清空筛选列表</span></span><br><span class="line">    treeView1.Nodes.Clear();</span><br><span class="line">    <span class="comment">// 生成全部列表</span></span><br><span class="line">    TreeView_show();</span><br><span class="line"></span><br><span class="line">    listSearchTreeNodes = <span class="keyword">new</span> List&lt;TreeNode&gt;();</span><br><span class="line">    <span class="keyword">if</span> (<span class="built_in">string</span>.IsNullOrEmpty(textBox1.Text.Trim())) </span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 搜索节点以及递归搜索子节点</span></span><br><span class="line">    knownNodeTexts = <span class="keyword">new</span> List&lt;<span class="built_in">string</span>&gt; &#123; &#125;;</span><br><span class="line">    <span class="keyword">foreach</span> (TreeNode node <span class="keyword">in</span> treeView1.Nodes) &#123; SearchLayer(node, <span class="keyword">this</span>.textBox1.Text.Trim()); &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 把搜索出来的节点进行展开</span></span><br><span class="line">    <span class="keyword">for</span> (<span class="built_in">int</span> i = <span class="number">0</span>; i &lt; listSearchTreeNodes.Count; i++)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="comment">// 获得父级节点</span></span><br><span class="line">        TreeNode trNode = listSearchTreeNodes[i]; FindParentNode(trNode);</span><br><span class="line">        <span class="comment"><span class="doctag">///</span>/ 选中父节点达到跳转效果</span></span><br><span class="line">        <span class="comment">//if (i == 0 &amp;&amp; trNode.Parent != null) &#123; treeView1.SelectedNode = trNode.Parent; &#125;</span></span><br><span class="line">        trNode.NodeFont = <span class="keyword">new</span> Font(<span class="string">&quot;宋体&quot;</span>, <span class="number">9</span>, FontStyle.Bold); </span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    FilterTreeView(treeView1, knownNodeTexts); treeView1.ExpandAll();</span><br><span class="line">    toolStripStatusLabel1.Text = <span class="string">$&quot;搜索到：<span class="subst">&#123;listSearchTreeNodes.Count&#125;</span> 个结果&quot;</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">SearchLayer</span>(<span class="params">TreeNode node, <span class="built_in">string</span> name</span>)<span class="comment">//递归，搜索节点</span></span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">if</span> (node.Nodes.Count != <span class="number">0</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">for</span> (<span class="built_in">int</span> i = <span class="number">0</span>; i &lt; node.Nodes.Count; i++) &#123; SearchLayer(node.Nodes[i], name); &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">else</span> <span class="keyword">if</span> (<span class="built_in">string</span>.Equals(node.Text, name) || node.Text.Contains(name)) &#123; listSearchTreeNodes.Add(node); &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">FindParentNode</span>(<span class="params">TreeNode node</span>) <span class="comment">//递归，获得父级节点</span></span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">if</span> (node.Parent != <span class="literal">null</span>) &#123; knownNodeTexts.Add(node.Text); node.Expand(); FindParentNode(node.Parent); &#125;</span><br><span class="line">    <span class="keyword">else</span> &#123; knownNodeTexts.Add(node.Text); &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">ExpandNode</span>(<span class="params">TreeNode node</span>) <span class="comment">//递归，展开节点</span></span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">if</span> (node.Parent != <span class="literal">null</span>) &#123; node.Expand(); ExpandNode(node.Parent); &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta">#<span class="keyword">endregion</span> TreeView模糊查找节点，需要包括父级node节点</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">region</span> 过滤方法，不是搜索内容的节点删除</span></span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">FilterTreeView</span>(<span class="params">TreeView treeView, List&lt;<span class="built_in">string</span>&gt; knownTexts</span>)</span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">foreach</span> (TreeNode node <span class="keyword">in</span> treeView.Nodes.Cast&lt;TreeNode&gt;().ToList())</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span> (!knownTexts.Contains(node.Text)) &#123; treeView.Nodes.Remove(node); &#125;</span><br><span class="line">        <span class="keyword">else</span> &#123; FilterChildNodes(node, knownTexts); &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">FilterChildNodes</span>(<span class="params">TreeNode parentNode, List&lt;<span class="built_in">string</span>&gt; knownTexts</span>)</span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">foreach</span> (TreeNode node <span class="keyword">in</span> parentNode.Nodes.Cast&lt;TreeNode&gt;().ToList())</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span> (!knownTexts.Contains(node.Text)) &#123; parentNode.Nodes.Remove(node); &#125;</span><br><span class="line">        <span class="keyword">else</span> &#123; FilterChildNodes(node, knownTexts); &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta">#<span class="keyword">endregion</span> 过滤方法</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>
