n class="attribute">color</span>:blue;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span><span class="comment">&lt;!--内部样式--&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--元素样式</span></span><br><span class="line"><span class="comment">        定义字体类型：font-family: sans-serif;</span></span><br><span class="line"><span class="comment">        定义字体大小：font-size: 30px;</span></span><br><span class="line"><span class="comment">        定义字体颜色：color: red;（或#000000，或rgb(0, 0, 0)或hsl(180, 100%, 100%)）</span></span><br><span class="line"><span class="comment">        定义段落行高：line-height</span></span><br><span class="line"><span class="comment">        定义元素居中：margin: auto;</span></span><br><span class="line"><span class="comment">        定义背景颜色：background-color: green;</span></span><br><span class="line"><span class="comment">        定义颜色渐变：background: linear-gradient(gradient_direction, color 1, color 2, color 3, ...);</span></span><br><span class="line"><span class="comment">        定义图片大小：width: 500px;height: 20px;</span></span><br><span class="line"><span class="comment">        定义内宽：padding: 20px; padding-top（right,bottom,left）; 顺时针上右下左填充padding: 10px 20px 10px 20px;</span></span><br><span class="line"><span class="comment">        定义边距：margin: 20px; 同理padding</span></span><br><span class="line"><span class="comment">    --&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--方法1：定义在h2元素内的样式--&gt;</span>    </span><br><span class="line">    <span class="tag">&lt;<span class="name">h2</span> <span class="attr">style</span>=<span class="string">&quot;color: red;&quot;</span>&gt;</span>CatPhotoApp<span class="tag">&lt;/<span class="name">h2</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--方法2：定义全部h3元素的样式--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-tag">h3</span>&#123;<span class="attribute">font-size</span>: <span class="number">30px</span>;<span class="attribute">color</span>: red;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">h3</span>&gt;</span>CatPhotoApp<span class="tag">&lt;/<span class="name">h3</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--方法3：定义样式类,class接收--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-class">.imagestyle</span>&#123;<span class="attribute">width</span>: <span class="number">500px</span>;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">img</span> <span class="attr">class</span>=<span class="string">&quot;imagestyle&quot;</span> <span class="attr">src</span>=<span class="string">&quot;截图/css 使用媒体查询改变变量.png&quot;</span> <span class="attr">alt</span>=<span class="string">&quot;无法加载&quot;</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--方法4：定义一个id(唯一性)。来设置单个元素的样式，JavaScript修改特定元素--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-id">#cat-photo-app</span> &#123;<span class="attribute">background-color</span>: green;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">h2</span> <span class="attr">id</span>=<span class="string">&quot;cat-photo-app&quot;</span>&gt;</span>cat-photo-app<span class="tag">&lt;<span class="name">h2</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--方法5：定义一个tyle属性选择器，对特定属性值的元素设置样式--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-attr">[type=<span class="string">&#x27;checkbox&#x27;</span>]</span> &#123;<span class="attribute">margin</span>: <span class="number">20px</span> <span class="number">0px</span> <span class="number">20px</span> <span class="number">0px</span>;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">label</span>&gt;</span><span class="tag">&lt;<span class="name">input</span> <span class="attr">type</span>=<span class="string">&quot;checkbox&quot;</span> <span class="attr">name</span>=<span class="string">&quot;personality&quot;</span> <span class="attr">checked</span>&gt;</span> Loving<span class="tag">&lt;/<span class="name">label</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--定义多样式时，用空格分开class--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">h2</span> <span class="attr">class</span>=<span class="string">&quot;class1 class2&quot;</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--元素周围添加边框，边框颜色，宽度，类型，圆角（可以是像素值，也可以是百分比）--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-class">.thin-red-border</span> &#123;</span></span><br><span class="line"><span class="language-css">          <span class="attribute">border-color</span>: red;</span></span><br><span class="line"><span class="language-css">          <span class="attribute">border-width</span>: <span class="number">5px</span>;</span></span><br><span class="line"><span class="language-css">          <span class="attribute">border-style</span>: solid;</span></span><br><span class="line"><span class="language-css">          <span class="attribute">border-radius</span>:<span class="number">10px</span>;</span></span><br><span class="line"><span class="language-css">          <span class="attribute">border-radius</span>:<span class="number">50%</span>;</span></span><br><span class="line"><span class="language-css">        &#125;</span></span><br><span class="line"><span class="language-css">    </span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--除了px，还有绝对长度in，mm； 相对em，rem--&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--同类型冲突样式，!important;会优于内联会优于id会优先于class，同类型会以最后一个为准--&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--创建自定义 CSS 变量,需为其命名，两个连字符+一个值--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-class">.penguin</span> &#123;<span class="attr">--penguin-skin</span>:gray;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--使用自定义 CSS 变量，当浏览器无法显示时，使用备用值内容显示--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css">属性名： <span class="selector-tag">var</span>(<span class="attr">--penguin-skin</span>,备用值);</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--继承 CSS 变量--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="language-css"><span class="selector-pseudo">:root</span> &#123;<span class="attr">--penguin-belly</span>: pink;&#125;</span><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt
